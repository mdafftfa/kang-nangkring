name: Build and Release

on:
  push:
    branches: [ master, main, MASTER ]
    
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish Bot
        run: dotnet publish -c Release -o ./publish

      - name: Deploy to Branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
          branch: deploy
          folder: ./publish
          clean: true

      - name: Update VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Masuk ke folder project
            cd ~/kang-nangkring || exit
            
            # Update source code dari branch deploy
            git fetch origin deploy
            git reset --hard origin/deploy
            
            # Build image baru
            docker build -t kang-nangkring .
            
            # Hapus container lama jika ada
            docker stop bot-nangkring 2>/dev/null || true
            docker rm bot-nangkring 2>/dev/null || true
            
            # Jalankan bot baru
            # Note: Tambahkan --net=host jika bot butuh akses network VPS langsung
            docker run -d \
              --name bot-nangkring \
              --restart always \
              --net=host \
              -e DiscordToken="${{ secrets.DISCORD_TOKEN }}" \
              kang-nangkring